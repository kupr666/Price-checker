services:
  application:
    build: .
    container_name: application-container
    depends_on:
      db:
        condition: service_healthy
    environment:
      TELEGRAM_TOKEN:
      TELEGRAM_CHAT_ID:
      LOG_LEVEL: DEBUG
      SERVER_PORT: :9091
      CHECK_INTERVAL: 1m
      CONNECTION_STRING: ${CONNECTION_STRING}
    ports:
      - "9091:9091"

  db:
    image: postgres:18.3-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  redis:
    image: 8.6-alpine
    ports:
      - "6379:6379" 
    healthcheck:
      test: ["CMD, redis-cli, ping"]
      interval: 5s
      timeout: 5s
      retries: 5